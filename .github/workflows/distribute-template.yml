name: Distribute template

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        options:
          - dry-run
          - apply
        default: dry-run
      full_sync:
        description: "Process all files (skip the changed-files filter)"
        type: boolean
        default: false

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Register repo-name masks
        env:
          DISTRIBUTE_TARGETS: ${{ secrets.DISTRIBUTE_TARGETS }}
        run: |
          set -euo pipefail
          while IFS= read -r r; do
            if [[ -n "$r" ]]; then
              echo "::add-mask::$r"
            fi
          done < <(jq -r '.targets[].repo' <<<"$DISTRIBUTE_TARGETS")

      - name: Compute changed paths
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          full="${{ inputs.full_sync || 'false' }}"
          if [[ "$full" == "true" ]]; then
            changed=""
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            if [[ "$base" =~ ^0+$ ]]; then
              changed=""
            else
              changed=$(gh api "repos/${{ github.repository }}/compare/${base}...${{ github.sha }}" --jq '.files[].filename')
            fi
          else
            changed=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" --jq '.files[].filename')
          fi
          {
            echo "files<<__EOF__"
            echo "$changed"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Run distribution
        env:
          DISTRIBUTE_TARGETS: ${{ secrets.DISTRIBUTE_TARGETS }}
          GH_TOKEN: ${{ secrets.DISTRIBUTE_TOKEN }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'apply' }}
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: bash .github/scripts/distribute.sh
